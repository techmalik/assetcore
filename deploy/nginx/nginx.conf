# Plain-HTTP server for local/docker testing and as the target of a TLS
# terminator. For internet-facing production, either:
#   (a) put this behind a load balancer / reverse proxy that terminates TLS
#       and forwards plain HTTP here, or
#   (b) uncomment the HTTPS server block below and supply real certs.
# See docs/DEPLOYMENT.md for the full TLS walkthrough.

# Uploads: photos/attachments/report files pass through here — keep this in
# sync with any per-route multer limits (currently 25 MB) in apps/api.
client_max_body_size 30m;

server {
    listen 80;
    server_name _;

    # Tenant app SPA
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backoffice SPA — our internal console, same origin, different subpath.
    # Client ICT should additionally restrict /admin/ to a VPN/allowlist at
    # the network layer (see docs/SECURITY.md) — nginx alone doesn't do that.
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    location /api/ {
        proxy_pass http://api:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

