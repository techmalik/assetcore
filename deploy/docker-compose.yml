# Production/client deployment: 3 services — postgres, api, nginx (serves both
# SPAs + proxies /api). Run from the repo root:
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env.deploy up -d --build
# See docs/DEPLOYMENT.md for the full runbook (migrate, provision, smoke test).
name: assetcore

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env.deploy}
      POSTGRES_DB: assetcore
    volumes:
      - assetcore_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_OWNER: ${DATABASE_URL_OWNER}
      APP_ORIGIN: ${APP_ORIGIN}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in deploy/.env.deploy}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-60m}
      FILES_DIR: /data/files
      LOGS_DIR: /data/logs
      TZ: ${TZ:-Africa/Lagos}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-AssetCore <no-reply@assetcore.local>}
      NODE_ENV: production
    volumes:
      - assetcore_files:/data/files
      - assetcore_logs:/data/logs

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${HTTP_PORT:-80}:80'

volumes:
  assetcore_pgdata:
  assetcore_files:
  assetcore_logs:
